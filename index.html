<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vacaciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .login-screen {
            padding: 60px 30px;
            text-align: center;
        }
        
        .login-box {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .login-box h2 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            margin-left: 10px;
        }
        
        .main-content {
            padding: 30px;
        }
        
        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .user-info h2 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .user-info p {
            color: #555;
            margin: 5px 0;
        }
        
        .alert {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        
        .alert-danger {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }
        
        .year-accordion {
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .year-header {
            background: #f8f9fa;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }
        
        .year-header:hover {
            background: #e9ecef;
        }
        
        .year-header h3 {
            color: #333;
            font-size: 1.1em;
        }
        
        .year-header .toggle {
            color: #667eea;
            font-size: 1.2em;
        }
        
        .year-content {
            padding: 20px;
            display: none;
            background: white;
        }
        
        .year-content.active {
            display: block;
        }
        
        .day-list {
            list-style: none;
        }
        
        .day-list li {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .day-list li:last-child {
            border-bottom: none;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            margin-left: 10px;
        }
        
        .status-disfrutadas {
            background: #d4edda;
            color: #155724;
        }
        
        .status-pagadas {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .status-sin-fecha {
            background: #fff3cd;
            color: #856404;
        }
        
        .admin-panel {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .admin-panel h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-row input,
        .form-row select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .employee-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .employee-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
        }
        
        .employee-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .employee-table tr:hover {
            background: #f8f9fa;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
        }
        
        .hidden {
            display: none;
        }
        
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .money-info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }
        
        .money-info h4 {
            color: #0066cc;
            margin-bottom: 10px;
        }
        
        .money-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            color: #666;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏖️ Sistema de Control de Vacaciones</h1>
            <p>Gestión y seguimiento de días de descanso</p>
            <button class="logout-btn hidden" id="logoutBtn" onclick="logout()">Cerrar Sesión</button>
        </div>
        
        <!-- Login Screen -->
        <div id="loginScreen" class="login-screen">
            <div class="login-box">
                <h2>Iniciar Sesión</h2>
                <div class="form-group">
                    <label for="userSelect">Selecciona tu número de empleado o código:</label>
                    <select id="userSelect">
                        <option value="">-- Seleccionar --</option>
                        <option value="DIRANA">DIRANA (Directores)</option>
                    </select>
                </div>
                <button class="btn" onclick="login()">Ingresar</button>
                <div id="loginError" class="error hidden" style="margin-top: 20px;"></div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div id="mainContent" class="main-content hidden">
            <div class="loading" id="loadingDiv">
                <p>Cargando información...</p>
            </div>
            <div id="contentDiv" class="hidden"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1LspktCHoVlK4QDGY6-gB162B5Y2BBJxS6IlCBPiClv8';
        let empleadosData = [];
        let vacacionesData = [];
        let currentUser = null;
        
        // Tablas de vacaciones según antigüedad
        const vacacionesTabla2023 = {
            1: 12, 2: 14, 3: 16, 4: 18, 5: 20, 6: 22, 7: 22, 8: 22, 9: 22, 10: 22,
            11: 24, 12: 24, 13: 24, 14: 24, 15: 24
        };
        
        const vacacionesTabla2022 = {
            1: 6, 2: 8, 3: 10, 4: 12, 5: 14, 6: 14, 7: 14, 8: 14, 9: 14, 10: 16,
            11: 16, 12: 16, 13: 16, 14: 16, 15: 18
        };
        
        // Cargar datos del Sheet
        async function loadSheetData() {
            try {
                // Cargar empleados
                const empleadosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Empleados`;
                const empleadosResponse = await fetch(empleadosUrl);
                const empleadosText = await empleadosResponse.text();
                const empleadosJson = JSON.parse(empleadosText.substring(47).slice(0, -2));
                
                empleadosData = empleadosJson.table.rows.map(row => ({
                    numero: row.c[0]?.v || '',
                    nombre: row.c[1]?.v || '',
                    fechaIngreso: row.c[2]?.v ? parseDate(row.c[2].f || row.c[2].v) : null,
                    salarioDiario: parseFloat(row.c[3]?.v || 0),
                    equipo: row.c[4]?.v || '',
                    rol: row.c[5]?.v || 'Empleado'
                }));
                
                // Cargar vacaciones
                const vacacionesUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Vacaciones_Tomadas`;
                const vacacionesResponse = await fetch(vacacionesUrl);
                const vacacionesText = await vacacionesResponse.text();
                const vacacionesJson = JSON.parse(vacacionesText.substring(47).slice(0, -2));
                
                vacacionesData = vacacionesJson.table.rows.map(row => ({
                    numeroEmpleado: row.c[0]?.v || '',
                    fecha: row.c[1]?.v ? parseDate(row.c[1].f || row.c[1].v) : null,
                    anio: parseInt(row.c[2]?.v || 0),
                    status: row.c[3]?.v || 'Disfrutadas'
                }));
                
                populateUserSelect();
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Error al cargar los datos del sistema. Verifica que el Sheet esté compartido correctamente.');
            }
        }
        
        function parseDate(dateStr) {
            if (!dateStr) return null;
            
            // Si viene como "Date(año, mes, día)"
            if (dateStr.toString().includes('Date')) {
                const match = dateStr.match(/Date\((\d+),(\d+),(\d+)\)/);
                if (match) {
                    return new Date(parseInt(match[1]), parseInt(match[2]), parseInt(match[3]));
                }
            }
            
            // Si viene como string de fecha
            const date = new Date(dateStr);
            if (!isNaN(date.getTime())) {
                return date;
            }
            
            return null;
        }
        
        function populateUserSelect() {
            const select = document.getElementById('userSelect');
            
            empleadosData.forEach(emp => {
                const option = document.createElement('option');
                option.value = emp.numero;
                option.textContent = `${emp.numero} - ${emp.nombre}`;
                select.appendChild(option);
            });
        }
        
        function login() {
            const selectedValue = document.getElementById('userSelect').value;
            
            if (!selectedValue) {
                showLoginError('Por favor selecciona un usuario');
                return;
            }
            
            if (selectedValue === 'DIRANA') {
                currentUser = {
                    tipo: 'DIRECTOR',
                    nombre: 'Director',
                    rol: 'Director'
                };
            } else {
                const empleado = empleadosData.find(e => e.numero === selectedValue);
                if (!empleado) {
                    showLoginError('Empleado no encontrado');
                    return;
                }
                currentUser = {
                    tipo: empleado.rol.toUpperCase(),
                    ...empleado
                };
            }
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            
            loadUserContent();
        }
        
        function logout() {
            currentUser = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('contentDiv').classList.add('hidden');
            document.getElementById('loadingDiv').classList.remove('hidden');
            document.getElementById('userSelect').value = '';
        }
        
        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }
        
        function showError(message) {
            const contentDiv = document.getElementById('contentDiv');
            contentDiv.innerHTML = `<div class="error">${message}</div>`;
            contentDiv.classList.remove('hidden');
            document.getElementById('loadingDiv').classList.add('hidden');
        }
        
        function loadUserContent() {
            document.getElementById('loadingDiv').classList.remove('hidden');
            document.getElementById('contentDiv').classList.add('hidden');
            
            setTimeout(() => {
                if (currentUser.tipo === 'ADMIN') {
                    renderAdminView();
                } else if (currentUser.tipo === 'DIRECTOR') {
                    renderDirectorView();
                } else if (currentUser.tipo === 'GERENTE') {
                    renderGerenteView();
                } else {
                    renderEmpleadoView();
                }
                
                document.getElementById('loadingDiv').classList.add('hidden');
                document.getElementById('contentDiv').classList.remove('hidden');
            }, 500);
        }
        
        function calcularAntiguedad(fechaIngreso) {
            if (!fechaIngreso) return 0;
            const hoy = new Date();
            const diff = hoy - fechaIngreso;
            const years = diff / (1000 * 60 * 60 * 24 * 365.25);
            return Math.floor(years) + 1;
        }
        
        function getDiasCorresponden(fechaIngreso, anio) {
            if (!fechaIngreso) return 0;
            
            const fechaAniversario = new Date(fechaIngreso);
            fechaAniversario.setFullYear(fechaIngreso.getFullYear() + anio - 1);
            
            // Si el año empezó antes de 2023, usar tabla antigua
            if (fechaAniversario.getFullYear() < 2023) {
                return vacacionesTabla2022[Math.min(anio, 15)] || 18;
            } else {
                return vacacionesTabla2023[Math.min(anio, 15)] || 24;
            }
        }
        
        function calcularVacaciones(empleado) {
            const aniosAntiguedad = calcularAntiguedad(empleado.fechaIngreso);
            const vacacionesPorAnio = [];
            
            for (let anio = 1; anio <= aniosAntiguedad; anio++) {
                const diasCorresponden = getDiasCorresponden(empleado.fechaIngreso, anio);
                const vacacionesAnio = vacacionesData.filter(v => 
                    v.numeroEmpleado === empleado.numero && v.anio === anio
                );
                
                let diasDisfrutados = 0;
                let diasPagados = 0;
                let diasSinFecha = 0;
                const detalles = [];
                
                vacacionesAnio.forEach(vac => {
                    if (vac.status === 'Pagadas') {
                        diasPagados = diasCorresponden;
                    } else if (vac.status === 'Disfrutadas sin fecha') {
                        diasSinFecha = diasCorresponden;
                    } else if (vac.fecha) {
                        diasDisfrutados++;
                        detalles.push({
                            fecha: vac.fecha,
                            status: vac.status
                        });
                    }
                });
                
                const diasPendientes = diasCorresponden - diasDisfrutados - diasPagados - diasSinFecha;
                
                // Calcular fecha de vencimiento
                let fechaVencimiento = null;
                let diasParaVencer = null;
                if (empleado.fechaIngreso) {
                    const fechaInicioAnio = new Date(empleado.fechaIngreso);
                    fechaInicioAnio.setFullYear(empleado.fechaIngreso.getFullYear() + anio - 1);
                    
                    // Solo vencen si iniciaron en 2025 o después
                    if (fechaInicioAnio.getFullYear() >= 2025) {
                        fechaVencimiento = new Date(fechaInicioAnio);
                        fechaVencimiento.setFullYear(fechaVencimiento.getFullYear() + 1);
                        fechaVencimiento.setDate(fechaVencimiento.getDate() - 1);
                        
                        const hoy = new Date();
                        diasParaVencer = Math.ceil((fechaVencimiento - hoy) / (1000 * 60 * 60 * 24));
                    }
                }
                
                vacacionesPorAnio.push({
                    anio,
                    diasCorresponden,
                    diasDisfrutados,
                    diasPagados,
                    diasSinFecha,
                    diasPendientes,
                    detalles,
                    fechaVencimiento,
                    diasParaVencer
                });
            }
            
            return vacacionesPorAnio;
        }
        
        function renderEmpleadoView() {
            const empleado = currentUser;
            const vacaciones = calcularVacaciones(empleado);
            const totalPendientes = vacaciones.reduce((sum, v) => sum + v.diasPendientes, 0);
            
            let alertas = '';
            vacaciones.forEach(v => {
                if (v.diasParaVencer !== null && v.diasParaVencer <= 30 && v.diasParaVencer > 0 && v.diasPendientes > 0) {
                    alertas += `
                        <div class="alert alert-danger">
                            ⚠️ <strong>ATENCIÓN:</strong> Te quedan ${v.diasPendientes} días de vacaciones del Año ${v.anio} 
                            que vencen el ${formatearFecha(v.fechaVencimiento)} (en ${v.diasParaVencer} días)
                        </div>
                    `;
                }
            });
            
            let html = `
                <div class="user-info">
                    <h2>👤 ${empleado.nombre}</h2>
                    <p><strong>Número:</strong> ${empleado.numero}</p>
                    <p><strong>Fecha de Ingreso:</strong> ${formatearFecha(empleado.fechaIngreso)}</p>
                    <p><strong>Antigüedad:</strong> ${calcularAntiguedad(empleado.fechaIngreso)} años</p>
                </div>
                
                ${alertas}
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>${totalPendientes}</h3>
                        <p>Días Pendientes</p>
                    </div>
                </div>
                
                <h3 style="margin-bottom: 20px;">📅 Historial de Vacaciones</h3>
            `;
            
            vacaciones.forEach(v => {
                html += renderYearAccordion(v, false);
            });
            
            document.getElementById('contentDiv').innerHTML = html;
        }
        
        function renderGerenteView() {
            const gerente = currentUser;
            const empleadosEquipo = empleadosData.filter(e => 
                e.equipo === gerente.nombre || e.numero === gerente.numero
            );
            
            let html = `
                <div class="user-info">
                    <h2>👔 ${gerente.nombre} - Gerente</h2>
                    <p><strong>Equipo:</strong> ${empleadosEquipo.length} personas</p>
                </div>
                
                <h3 style="margin-bottom: 20px;">👥 Tu Equipo</h3>
            `;
            
            empleadosEquipo.forEach(emp => {
                const vacaciones = calcularVacaciones(emp);
                const totalPendientes = vacaciones.reduce((sum, v) => sum + v.diasPendientes, 0);
                
                html += `
                    <div class="year-accordion">
                        <div class="year-header" onclick="toggleAccordion(this)">
                            <h3>${emp.nombre} - ${totalPendientes} días pendientes</h3>
                            <span class="toggle">▼</span>
                        </div>
                        <div class="year-content">
                            <p><strong>Número:</strong> ${emp.numero}</p>
                            <p><strong>Fecha de Ingreso:</strong> ${formatearFecha(emp.fechaIngreso)}</p>
                            <p><strong>Antigüedad:</strong> ${calcularAntiguedad(emp.fechaIngreso)} años</p>
                            <hr style="margin: 15px 0;">
                `;
                
                vacaciones.forEach(v => {
                    html += renderYearAccordion(v, false);
                });
                
                html += `</div></div>`;
            });
            
            document.getElementById('contentDiv').innerHTML = html;
        }
        
        function renderDirectorView() {
            let html = `
                <div class="user-info">
                    <h2>🎯 Vista de Director</h2>
                    <p>Acceso completo a toda la información</p>
                </div>
                
                <h3 style="margin-bottom: 20px;">📊 Todos los Empleados</h3>
            `;
            
            empleadosData.forEach(emp => {
                const vacaciones = calcularVacaciones(emp);
                const totalPendientes = vacaciones.reduce((sum, v) => sum + v.diasPendientes, 0);
                const totalDiasPendientes = vacaciones.reduce((sum, v) => sum + v.diasPendientes, 0);
                const valorDiasPendientes = totalDiasPendientes * emp.salarioDiario;
                const primaPendiente = valorDiasPendientes * 0.25;
                const totalPendientePesos = valorDiasPendientes + primaPendiente;
                
                html += `
                    <div class="year-accordion">
                        <div class="year-header" onclick="toggleAccordion(this)">
                            <h3>${emp.nombre} - ${totalPendientes} días pendientes - $${totalPendientePesos.toFixed(2)}</h3>
                            <span class="toggle">▼</span>
                        </div>
                        <div class="year-content">
                            <p><strong>Número:</strong> ${emp.numero}</p>
                            <p><strong>Fecha de Ingreso:</strong> ${formatearFecha(emp.fechaIngreso)}</p>
                            <p><strong>Antigüedad:</strong> ${calcularAntiguedad(emp.fechaIngreso)} años</p>
                            <p><strong>Salario Diario:</strong> $${emp.salarioDiario.toFixed(2)}</p>
                            <p><strong>Equipo:</strong> ${emp.equipo || 'N/A'}</p>
                            
                            <div class="money-info">
                                <h4>💰 Valor en Pesos de Días Pendientes</h4>
                                <div class="money-row">
                                    <span>Días pendientes:</span>
                                    <strong>${totalDiasPendientes} días</strong>
                                </div>
                                <div class="money-row">
                                    <span>Valor días (${totalDiasPendientes} × $${emp.salarioDiario.toFixed(2)}):</span>
                                    <strong>$${valorDiasPendientes.toFixed(2)}</strong>
                                </div>
                                <div class="money-row">
                                    <span>Prima vacacional (25%):</span>
                                    <strong>$${primaPendiente.toFixed(2)}</strong>
                                </div>
                                <hr style="margin: 10px 0;">
                                <div class="money-row">
                                    <span><strong>TOTAL:</strong></span>
                                    <strong style="color: #0066cc; font-size: 1.2em;">$${totalPendientePesos.toFixed(2)}</strong>
                                </div>
                            </div>
                            <hr style="margin: 15px 0;">
                `;
                
                vacaciones.forEach(v => {
                    html += renderYearAccordion(v, true, emp.salarioDiario);
                });
                
                html += `</div></div>`;
            });
            
            document.getElementById('contentDiv').innerHTML = html;
        }
        
        function renderAdminView() {
            let html = `
                <div class="user-info">
                    <h2>⚙️ Panel de Administración</h2>
                    <p><strong>Usuario:</strong> ${currentUser.nombre}</p>
                </div>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('miVacaciones')">Mis Vacaciones</button>
                    <button class="tab" onclick="switchTab('todosEmpleados')">Todos los Empleados</button>
                    <button class="tab" onclick="switchTab('agregarEmpleado')">Agregar Empleado</button>
                    <button class="tab" onclick="switchTab('registrarVacaciones')">Registrar Vacaciones</button>
                </div>
                
                <div id="tabMiVacaciones" class="tab-content active">
            `;
            
            // Mis vacaciones
            const vacaciones = calcularVacaciones(currentUser);
            const totalPendientes = vacaciones.reduce((sum, v) => sum + v.diasPendientes, 0);
            
            html += `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>${totalPendientes}</h3>
                        <p>Mis Días Pendientes</p>
                    </div>
                </div>
            `;
            
            vacaciones.forEach(v => {
                html += renderYearAccordion(v, false);
            });
            
            html += `</div>`;
            
            // Todos los empleados (igual que director)
            html += `<div id="tabTodosEmpleados" class="tab-content">`;
            
            empleadosData.forEach(emp => {
                const vacaciones = calcularVacaciones(emp);
                const totalPendientes = vacaciones.reduce((sum, v) => sum + v.diasPendientes, 0);
                const totalDiasPendientes = vacaciones.reduce((sum, v) => sum + v.diasPendientes, 0);
                const valorDiasPendientes = totalDiasPendientes * emp.salarioDiario;
                const primaPendiente = valorDiasPendientes * 0.25;
                const totalPendientePesos = valorDiasPendientes + primaPendiente;
                
                html += `
                    <div class="year-accordion">
                        <div class="year-header" onclick="toggleAccordion(this)">
                            <h3>${emp.nombre} - ${totalPendientes} días pendientes - $${totalPendientePesos.toFixed(2)}</h3>
                            <span class="toggle">▼</span>
                        </div>
                        <div class="year-content">
                            <p><strong>Número:</strong> ${emp.numero}</p>
                            <p><strong>Fecha de Ingreso:</strong> ${formatearFecha(emp.fechaIngreso)}</p>
                            <p><strong>Antigüedad:</strong> ${calcularAntiguedad(emp.fechaIngreso)} años</p>
                            <p><strong>Salario Diario:</strong> $${emp.salarioDiario.toFixed(2)}</p>
                            
                            <div class="money-info">
                                <h4>💰 Valor en Pesos de Días Pendientes</h4>
                                <div class="money-row">
                                    <span>Días pendientes:</span>
                                    <strong>${totalDiasPendientes} días</strong>
                                </div>
                                <div class="money-row">
                                    <span>Valor días:</span>
                                    <strong>$${valorDiasPendientes.toFixed(2)}</strong>
                                </div>
                                <div class="money-row">
                                    <span>Prima (25%):</span>
                                    <strong>$${primaPendiente.toFixed(2)}</strong>
                                </div>
                                <hr style="margin: 10px 0;">
                                <div class="money-row">
                                    <span><strong>TOTAL:</strong></span>
                                    <strong style="color: #0066cc; font-size: 1.2em;">$${totalPendientePesos.toFixed(2)}</strong>
                                </div>
                            </div>
                            <hr style="margin: 15px 0;">
                `;
                
                vacaciones.forEach(v => {
                    html += renderYearAccordion(v, true, emp.salarioDiario);
                });
                
                html += `</div></div>`;
            });
            
            html += `</div>`;
            
            // Agregar empleado
            html += `
                <div id="tabAgregarEmpleado" class="tab-content">
                    <div class="admin-panel">
                        <h3>➕ Agregar Nuevo Empleado</h3>
                        <p style="color: #666; margin-bottom: 20px;">
                            Para agregar un empleado, debes ir directamente al Google Sheet y agregar una fila en la pestaña "Empleados"
                        </p>
                        <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" class="btn">
                            Abrir Google Sheet
                        </a>
                    </div>
                </div>
            `;
            
            // Registrar vacaciones
            html += `
                <div id="tabRegistrarVacaciones" class="tab-content">
                    <div class="admin-panel">
                        <h3>📝 Registrar Vacaciones</h3>
                        <p style="color: #666; margin-bottom: 20px;">
                            Para registrar vacaciones, debes ir directamente al Google Sheet y agregar filas en la pestaña "Vacaciones_Tomadas"
                        </p>
                        <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit" target="_blank" class="btn">
                            Abrir Google Sheet
                        </a>
                    </div>
                </div>
            `;
            
            document.getElementById('contentDiv').innerHTML = html;
        }
        
        function renderYearAccordion(vacacionAnio, mostrarDinero = false, salarioDiario = 0) {
            let html = `
                <div class="year-accordion">
                    <div class="year-header" onclick="toggleAccordion(this)">
                        <div>
                            <h3>Año ${vacacionAnio.anio}</h3>
                            <p style="color: #666; font-size: 0.9em; margin-top: 5px;">
                                ${vacacionAnio.diasCorresponden} días totales • 
                                ${vacacionAnio.diasDisfrutados + vacacionAnio.diasPagados + vacacionAnio.diasSinFecha} usados • 
                                ${vacacionAnio.diasPendientes} pendientes
            `;
            
            if (vacacionAnio.fechaVencimiento && vacacionAnio.diasParaVencer > 0 && vacacionAnio.diasPendientes > 0) {
                html += ` • Vence en ${vacacionAnio.diasParaVencer} días`;
            }
            
            html += `
                            </p>
                        </div>
                        <span class="toggle">▼</span>
                    </div>
                    <div class="year-content">
            `;
            
            if (vacacionAnio.diasPagados > 0) {
                html += `<p><span class="status-badge status-pagadas">✓ ${vacacionAnio.diasPagados} días pagados en efectivo</span></p>`;
            }
            
            if (vacacionAnio.diasSinFecha > 0) {
                html += `<p><span class="status-badge status-sin-fecha">✓ ${vacacionAnio.diasSinFecha} días disfrutados (fechas no registradas)</span></p>`;
            }
            
            if (vacacionAnio.detalles.length > 0) {
                html += `<ul class="day-list">`;
                vacacionAnio.detalles.forEach((detalle, index) => {
                    html += `
                        <li>
                            ${index + 1}. ${formatearFechaCompleta(detalle.fecha)}
                            <span class="status-badge status-disfrutadas">Disfrutado</span>
                        </li>
                    `;
                });
                html += `</ul>`;
            }
            
            if (vacacionAnio.diasPendientes > 0) {
                html += `<p style="margin-top: 15px;"><strong>Días pendientes: ${vacacionAnio.diasPendientes}</strong></p>`;
                
                if (mostrarDinero && salarioDiario > 0) {
                    const valorDias = vacacionAnio.diasPendientes * salarioDiario;
                    const prima = valorDias * 0.25;
                    const total = valorDias + prima;
                    
                    html += `
                        <div class="money-info" style="margin-top: 10px;">
                            <div class="money-row">
                                <span>Valor días (${vacacionAnio.diasPendientes} × $${salarioDiario.toFixed(2)}):</span>
                                <strong>$${valorDias.toFixed(2)}</strong>
                            </div>
                            <div class="money-row">
                                <span>Prima vacacional (25%):</span>
                                <strong>$${prima.toFixed(2)}</strong>
                            </div>
                            <hr style="margin: 8px 0;">
                            <div class="money-row">
                                <span><strong>Total Año ${vacacionAnio.anio}:</strong></span>
                                <strong style="color: #0066cc;">$${total.toFixed(2)}</strong>
                            </div>
                        </div>
                    `;
                }
                
                if (vacacionAnio.fechaVencimiento && vacacionAnio.diasParaVencer !== null) {
                    if (vacacionAnio.diasParaVencer > 0 && vacacionAnio.diasParaVencer <= 30) {
                        html += `
                            <div class="alert alert-danger" style="margin-top: 15px;">
                                ⚠️ Estos días vencen el ${formatearFecha(vacacionAnio.fechaVencimiento)} (en ${vacacionAnio.diasParaVencer} días)
                            </div>
                        `;
                    } else if (vacacionAnio.diasParaVencer > 30) {
                        html += `
                            <p style="margin-top: 10px; color: #666;">
                                <small>Vencen el ${formatearFecha(vacacionAnio.fechaVencimiento)}</small>
                            </p>
                        `;
                    }
                }
            }
            
            html += `</div></div>`;
            return html;
        }
        
        function toggleAccordion(element) {
            const content = element.nextElementSibling;
            const toggle = element.querySelector('.toggle');
            
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                toggle.textContent = '▼';
            } else {
                content.classList.add('active');
                toggle.textContent = '▲';
            }
        }
        
        function switchTab(tabName) {
            // Remove active from all tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Add active to selected tab
            event.target.classList.add('active');
            document.getElementById('tab' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).classList.add('active');
        }
        
        function formatearFecha(fecha) {
            if (!fecha) return 'N/A';
            const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
            return fecha.toLocaleDateString('es-MX', opciones);
        }
        
        function formatearFechaCompleta(fecha) {
            if (!fecha) return 'N/A';
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return fecha.toLocaleDateString('es-MX', opciones);
        }
        
        // Initialize
        window.onload = () => {
            loadSheetData();
        };
    </script>
</body>
</html>
